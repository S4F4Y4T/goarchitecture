#:schema https://json.schemastore.org/any.json

root = "."
tmp_dir = "tmp"

[build]
  bin = "./bin/user"
  cmd = "go build -o ./bin/user ./services/user/cmd/api/main.go"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "bin"]
  exclude_regex = ["_test.go"]
  include_ext = ["go", "yaml"]
  kill_delay = "200ms"
  log = "tmp/build-errors.log"
  poll = true
  poll_interval = 1000
  send_interrupt = true
  stop_on_error = true

[color]
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true
