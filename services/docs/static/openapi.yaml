openapi: 3.0.3
info:
  title: Microservice API
  version: "1.0.0"
  description: REST API for the microservice.
servers:
  - url: http://localhost:8000
    description: API Gateway

tags:
  - name: health
  - name: auth
    description: Registration, login, token refresh, and logout
  - name: users
  - name: notifications
    description: Read-only audit log of notifications sent by the notification service (e.g. welcome emails)

paths:
  /healthz:
    get:
      tags: [health]
      summary: Liveness probe
      description: Returns 200 if the process is running. Performs no dependency checks.
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /readyz:
    get:
      tags: [health]
      summary: Readiness probe
      description: Returns 200 when the service is ready to serve traffic, including a database ping. Returns 503 when the database is unreachable.
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "503":
          description: Service is not ready (database unreachable)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /v1/auth/register:
    post:
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseUser"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"

  /v1/auth/login:
    post:
      tags: [auth]
      summary: Login and obtain access + refresh tokens
      description: |
        Returns the access token in the body. The refresh token is set as an
        httpOnly cookie (`refresh_token`) and is never exposed in the body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseAccessToken"
          headers:
            Set-Cookie:
              description: httpOnly refresh token cookie.
              schema:
                type: string
                example: "refresh_token=<uuid>; HttpOnly; SameSite=Strict; Path=/v1/auth"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"

  /v1/auth/refresh:
    post:
      tags: [auth]
      summary: Rotate tokens — exchange a refresh token for a new access + refresh pair
      description: |
        The refresh token is read from the `refresh_token` httpOnly cookie set by
        `/login`. The old token is consumed (deleted from Redis) and a new pair is
        issued: a new access token in the body and a new cookie.
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseAccessToken"
          headers:
            Set-Cookie:
              description: New `refresh_token` httpOnly cookie replacing the old one.
              schema:
                type: string
                example: "refresh_token=<uuid>; HttpOnly; SameSite=Strict; Path=/v1/auth"
        "401":
          $ref: "#/components/responses/ErrorResponse"

  /v1/auth/logout:
    post:
      tags: [auth]
      summary: Invalidate a refresh token
      description: |
        Reads the `refresh_token` httpOnly cookie and deletes it from Redis.
        Clears the cookie in the response. Idempotent — no cookie or an
        already-revoked token both return 204.
      responses:
        "204":
          description: Logged out successfully
          headers:
            Set-Cookie:
              description: Expires the `refresh_token` cookie immediately.
              schema:
                type: string
                example: "refresh_token=; HttpOnly; Max-Age=-1; Path=/v1/auth"

  /v1/users/:
    get:
      tags: [users]
      summary: List users
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          description: Page number (1-based).
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
        - name: limit
          in: query
          required: false
          description: Items per page.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
            example: 10
        - name: sort
          in: query
          required: false
          description: >
            Comma-separated fields in priority order; a leading '-' sorts
            descending. Allowed fields: id, name, email. Unknown fields are
            ignored.
          schema:
            type: string
            example: -name,id
        - name: filter[name]
          in: query
          required: false
          description: Case-insensitive partial match on name (ILIKE).
          schema:
            type: string
            example: al
        - name: filter[email]
          in: query
          required: false
          description: Case-insensitive partial match on email (ILIKE).
          schema:
            type: string
            example: "@example.com"
        - name: filter[id]
          in: query
          required: false
          description: Exact match on id.
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Users retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseUserList"
        "500":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [users]
      summary: Create user
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseUser"
        "400":
          $ref: "#/components/responses/ErrorResponse"

  /v1/users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [users]
      summary: Get user by ID
      security:
        - BearerAuth: []
      responses:
        "200":
          description: User retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseUser"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    put:
      tags: [users]
      summary: Update user (full replacement)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseUser"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [users]
      summary: Delete user
      security:
        - BearerAuth: []
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"

  /v1/notifications/:
    get:
      tags: [notifications]
      summary: List sent notifications
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
            example: 10
        - name: sort
          in: query
          required: false
          description: >
            Comma-separated fields in priority order; a leading '-' sorts
            descending. Allowed fields: id, type, recipient, status,
            created_at, updated_at.
          schema:
            type: string
            example: -created_at
        - name: filter[recipient]
          in: query
          required: false
          description: Case-insensitive partial match on recipient email (ILIKE).
          schema:
            type: string
            example: "@example.com"
        - name: filter[type]
          in: query
          required: false
          description: Exact match on event type, e.g. `user.created`.
          schema:
            type: string
            example: user.created
        - name: filter[status]
          in: query
          required: false
          description: Exact match on delivery status.
          schema:
            type: string
            enum: [sent, failed]
            example: sent
      responses:
        "200":
          description: Notifications retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseNotificationList"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /v1/notifications/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [notifications]
      summary: Get a notification by ID
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Notification retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseNotification"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: Alice
        email:
          type: string
          format: email
          example: alice@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: "s3cr3tpass"

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: alice@example.com
        password:
          type: string
          format: password
          example: "s3cr3tpass"

    AccessToken:
      type: object
      properties:
        access_token:
          type: string
          description: Short-lived JWT used in the Authorization header
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        expires_in:
          type: integer
          description: Access token lifetime in seconds
          example: 900

    ApiResponseAccessToken:
      allOf:
        - $ref: "#/components/schemas/ApiResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/AccessToken"

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Alice
        email:
          type: string
          format: email
          example: alice@example.com

    CreateUserRequest:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
          example: Alice
        email:
          type: string
          format: email
          example: alice@example.com

    # PUT replaces the whole resource, so the body carries every field.
    UpdateUserRequest:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
          example: Alice
        email:
          type: string
          format: email
          example: alice@example.com

    FieldError:
      type: object
      properties:
        field:
          type: string
        message:
          type: string

    ErrorBody:
      type: object
      properties:
        code:
          type: string
          enum:
            - NOT_FOUND
            - INVALID_INPUT
            - CONFLICT
            - UNAUTHORIZED
            - FORBIDDEN
            - INTERNAL
        message:
          type: string
        fields:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        total:
          type: integer
          format: int64
          example: 42
        total_pages:
          type: integer
          example: 5

    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        status_code:
          type: integer
          example: 200
        message:
          type: string
        data:
          nullable: true
        meta:
          nullable: true
        error:
          $ref: "#/components/schemas/ErrorBody"

    ApiResponseUser:
      allOf:
        - $ref: "#/components/schemas/ApiResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/User"

    ApiResponseUserList:
      allOf:
        - $ref: "#/components/schemas/ApiResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/User"
            meta:
              $ref: "#/components/schemas/PaginationMeta"

    Notification:
      type: object
      description: An audit row written by the notification service's RabbitMQ consumer — never created via this API.
      properties:
        id:
          type: integer
          example: 1
        event_id:
          type: string
          format: uuid
          description: The triggering event's id — unique, used for idempotent consumption.
          example: a9fc4f03-bed0-4602-8d09-8563e50449a0
        type:
          type: string
          example: user.created
        recipient:
          type: string
          format: email
          example: alice@example.com
        status:
          type: string
          enum: [sent, failed]
          example: sent
        error:
          type: string
          nullable: true
          description: Set only when status is failed (e.g. retries exhausted).
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ApiResponseNotification:
      allOf:
        - $ref: "#/components/schemas/ApiResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Notification"

    ApiResponseNotificationList:
      allOf:
        - $ref: "#/components/schemas/ApiResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Notification"
            meta:
              $ref: "#/components/schemas/PaginationMeta"

  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              status_code:
                type: integer
                example: 400
              error:
                $ref: "#/components/schemas/ErrorBody"
