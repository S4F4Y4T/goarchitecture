openapi: 3.0.3
info:
  title: Microservice API
  version: "1.0.0"
  description: REST API for the microservice.
servers:
  - url: http://localhost:6969
    description: Local dev

tags:
  - name: health
  - name: auth
  - name: users
  - name: products

# All endpoints require a Bearer token by default; public endpoints opt out
# with `security: []`.
security:
  - bearerAuth: []

paths:
  /healthz:
    get:
      tags: [health]
      summary: Liveness probe
      description: Returns 200 if the process is running. Performs no dependency checks.
      security: []
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /readyz:
    get:
      tags: [health]
      summary: Readiness probe
      description: Returns 200 when the service is ready to serve traffic, including a database ping. Returns 503 when the database is unreachable.
      security: []
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "503":
          description: Service is not ready (database unreachable)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /v1/auth/register:
    post:
      tags: [auth]
      summary: Register a new account
      description: >
        Creates an account with the "user" role and returns an access token.
        Roles are never taken from client input; promoting a user to admin is
        a manual database operation.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Account created and logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseAuth"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"

  /v1/auth/login:
    post:
      tags: [auth]
      summary: Log in
      description: Verifies credentials and returns an access token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseAuth"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"

  /v1/auth/me:
    get:
      tags: [auth]
      summary: Get the authenticated user
      responses:
        "200":
          description: User retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseUser"
        "401":
          $ref: "#/components/responses/ErrorResponse"

  /v1/users/:
    get:
      tags: [users]
      summary: List users
      parameters:
        - name: page
          in: query
          required: false
          description: Page number (1-based).
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
        - name: limit
          in: query
          required: false
          description: Items per page.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
            example: 10
        - name: sort
          in: query
          required: false
          description: >
            Comma-separated fields in priority order; a leading '-' sorts
            descending. Allowed fields: id, name, email, role, created_at,
            updated_at. Unknown fields are ignored.
          schema:
            type: string
            example: -name,id
        - name: filter[name]
          in: query
          required: false
          description: Case-insensitive partial match on name (ILIKE).
          schema:
            type: string
            example: al
        - name: filter[email]
          in: query
          required: false
          description: Case-insensitive partial match on email (ILIKE).
          schema:
            type: string
            example: "@example.com"
        - name: filter[id]
          in: query
          required: false
          description: Exact match on id.
          schema:
            type: integer
            example: 1
        - name: filter[role]
          in: query
          required: false
          description: Exact match on role.
          schema:
            type: string
            enum: [user, admin]
      responses:
        "200":
          description: Users retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseUserList"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [users]
      summary: Create user (admin only)
      description: >
        Admin-only. Creates a user without credentials; self-service signup
        is POST /v1/auth/register.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseUser"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"

  /v1/users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [users]
      summary: Get user by ID
      responses:
        "200":
          description: User retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseUser"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    put:
      tags: [users]
      summary: Update user (full replacement)
      description: Callers may update their own account; admins may update anyone.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseUser"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [users]
      summary: Delete user
      description: Callers may delete their own account; admins may delete anyone.
      responses:
        "204":
          description: User deleted
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"

  /v1/products/:
    get:
      tags: [products]
      summary: List products
      parameters:
        - name: page
          in: query
          required: false
          description: Page number (1-based).
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
        - name: limit
          in: query
          required: false
          description: Items per page.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
            example: 10
      responses:
        "200":
          description: Products retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseProductList"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [products]
      summary: Create product (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseProduct"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"

  /v1/products/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [products]
      summary: Get product by ID
      responses:
        "200":
          description: Product retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseProduct"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    put:
      tags: [products]
      summary: Update product (full replacement, admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductRequest"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseProduct"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [products]
      summary: Delete product (admin only)
      responses:
        "204":
          description: Product deleted
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Access token issued by /v1/auth/register or /v1/auth/login. Send as
        "Authorization: Bearer <token>".

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Alice
        email:
          type: string
          format: email
          example: alice@example.com
        role:
          type: string
          enum: [user, admin]
          example: user
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: Alice
        email:
          type: string
          format: email
          example: alice@example.com
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 72
          example: correct-horse-battery

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: alice@example.com
        password:
          type: string
          format: password
          example: correct-horse-battery

    AuthData:
      type: object
      properties:
        token:
          type: string
          description: JWT access token.
        user:
          $ref: "#/components/schemas/User"

    CreateUserRequest:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
          example: Alice
        email:
          type: string
          format: email
          example: alice@example.com

    # PUT replaces the whole resource, so the body carries every field.
    UpdateUserRequest:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
          example: Alice
        email:
          type: string
          format: email
          example: alice@example.com

    Product:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Widget
        description:
          type: string
          example: A useful widget
        price:
          type: number
          format: double
          example: 9.99

    CreateProductRequest:
      type: object
      required: [name, price]
      properties:
        name:
          type: string
          example: Widget
        description:
          type: string
          example: A useful widget
        price:
          type: number
          format: double
          minimum: 0
          example: 9.99

    # PUT replaces the whole resource, so the body carries every field.
    UpdateProductRequest:
      type: object
      required: [name, price]
      properties:
        name:
          type: string
          example: Widget
        description:
          type: string
          example: A useful widget
        price:
          type: number
          format: double
          minimum: 0
          example: 9.99

    FieldError:
      type: object
      properties:
        field:
          type: string
        message:
          type: string

    ErrorBody:
      type: object
      properties:
        code:
          type: string
          enum:
            - NOT_FOUND
            - INVALID_INPUT
            - CONFLICT
            - UNAUTHORIZED
            - FORBIDDEN
            - INTERNAL
        message:
          type: string
        fields:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        total:
          type: integer
          format: int64
          example: 42
        total_pages:
          type: integer
          example: 5

    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        status_code:
          type: integer
          example: 200
        message:
          type: string
        data:
          nullable: true
        meta:
          nullable: true
        error:
          $ref: "#/components/schemas/ErrorBody"

    ApiResponseAuth:
      allOf:
        - $ref: "#/components/schemas/ApiResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/AuthData"

    ApiResponseUser:
      allOf:
        - $ref: "#/components/schemas/ApiResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/User"

    ApiResponseUserList:
      allOf:
        - $ref: "#/components/schemas/ApiResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/User"
            meta:
              $ref: "#/components/schemas/PaginationMeta"

    ApiResponseProduct:
      allOf:
        - $ref: "#/components/schemas/ApiResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Product"

    ApiResponseProductList:
      allOf:
        - $ref: "#/components/schemas/ApiResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Product"
            meta:
              $ref: "#/components/schemas/PaginationMeta"

  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              status_code:
                type: integer
                example: 400
              error:
                $ref: "#/components/schemas/ErrorBody"
