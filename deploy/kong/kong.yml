_format_version: "3.0"
_transform: true

consumers:
  - username: app-users
    jwt_secrets:
      - algorithm: RS256
        # key is the value that must appear in the JWT "iss" claim
        key: go-microservice
        rsa_public_key: |
          -----BEGIN PUBLIC KEY-----
          MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA59iOBoE8gNp2Hy2RyT5r
          5cVAoVYWEOexQTn5N8FX72LfUwZ/2dPNkL0RuG/WtOBpQzX6P1PCQo7Y+TLueAoV
          3sZlZI34OWFvF/Ej82HYGKXb4Rsm+0TnmHW3MA/OKpG3I2jBnaUxrsjjYrxUkdD4
          zWnH/A4DSDvc2lnKZQ8yQgkl4s80+awDGdSbp3VmOJJhRqdmfdlHpyBfpDkxfCna
          kAFPHI/ViiEur3kMYMspaBPnLgjgvIxzG6FVefB7juzTX88qVGMSUx2phSFsXgXe
          dtDcvWu9tJ4UWKjBzGnuQGTzV9GgmsWyXRYvwoJzEMbIT4pqlJqVu9Z8KGi0v/dh
          oQIDAQAB
          -----END PUBLIC KEY-----

services:
  # ── Auth service — public, no JWT ────────────────────────────────────────────
  - name: auth-service
    url: http://auth_app:6868
    connect_timeout: 60000
    read_timeout: 60000
    write_timeout: 60000
    routes:
      - name: auth-service-routes
        paths:
          - /v1/auth
        strip_path: false
        preserve_host: false
        protocols:
          - http
      - name: auth-health-routes
        paths:
          - /healthz
          - /readyz
        strip_path: false
        preserve_host: false
        protocols:
          - http

    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - X-Request-ID
          exposed_headers:
            - X-Request-ID
          max_age: 3600
      - name: rate-limiting
        config:
          minute: 100
          policy: local
          fault_tolerant: true
          hide_client_headers: false
      - name: correlation-id
        config:
          header_name: X-Request-ID
          generator: uuid
          echo_downstream: true

  # ── User service ─────────────────────────────────────────────────────────────
  - name: user-service
    url: http://user_app:6969
    connect_timeout: 60000
    read_timeout: 60000
    write_timeout: 60000
    routes:
      - name: user-service-users
        paths:
          - /v1/users
        strip_path: false
        preserve_host: false
        protocols:
          - http
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              claims_to_verify:
                - exp
          - name: request-transformer
            config:
              remove:
                headers:
                  - X-User-ID
          - name: post-function
            config:
              access:
                - |
                  local token_str = kong.ctx.shared.authenticated_jwt_token
                  if token_str then
                    local b64 = token_str:match("^[^.]+%.([^.]+)%.")
                    if b64 then
                      local mod = #b64 % 4
                      if mod == 2 then b64 = b64 .. "=="
                      elseif mod == 3 then b64 = b64 .. "=" end
                      b64 = b64:gsub("%-", "+"):gsub("_", "/")
                      local payload = ngx.decode_base64(b64)
                      if payload then
                        local uid = payload:match('"uid"%s*:%s*(%d+)')
                        if uid then
                          kong.service.request.set_header("X-User-ID", uid)
                        end
                      end
                    end
                  end

    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - X-Request-ID
          exposed_headers:
            - X-Request-ID
          max_age: 3600
      - name: rate-limiting
        config:
          minute: 100
          policy: local
          fault_tolerant: true
          hide_client_headers: false
      - name: correlation-id
        config:
          header_name: X-Request-ID
          generator: uuid
          echo_downstream: true

  # ── Notification service ─────────────────────────────────────────────────────
  - name: notification-service
    url: http://notification_app:7171
    connect_timeout: 60000
    read_timeout: 60000
    write_timeout: 60000
    routes:
      - name: notification-service-notifications
        paths:
          - /v1/notifications
        strip_path: false
        preserve_host: false
        protocols:
          - http
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              claims_to_verify:
                - exp
          - name: request-transformer
            config:
              remove:
                headers:
                  - X-User-ID
          - name: post-function
            config:
              access:
                - |
                  local token_str = kong.ctx.shared.authenticated_jwt_token
                  if token_str then
                    local b64 = token_str:match("^[^.]+%.([^.]+)%.")
                    if b64 then
                      local mod = #b64 % 4
                      if mod == 2 then b64 = b64 .. "=="
                      elseif mod == 3 then b64 = b64 .. "=" end
                      b64 = b64:gsub("%-", "+"):gsub("_", "/")
                      local payload = ngx.decode_base64(b64)
                      if payload then
                        local uid = payload:match('"uid"%s*:%s*(%d+)')
                        if uid then
                          kong.service.request.set_header("X-User-ID", uid)
                        end
                      end
                    end
                  end

    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - X-Request-ID
          exposed_headers:
            - X-Request-ID
          max_age: 3600
      - name: rate-limiting
        config:
          minute: 100
          policy: local
          fault_tolerant: true
          hide_client_headers: false
      - name: correlation-id
        config:
          header_name: X-Request-ID
          generator: uuid
          echo_downstream: true

  # ── API Docs — public, no JWT ────────────────────────────────────────────────
  - name: docs-service
    url: http://docs_app:9090
    routes:
      - name: docs-route
        paths:
          - /docs
        strip_path: true
        preserve_host: false
        protocols:
          - http
