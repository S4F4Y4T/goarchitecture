_format_version: "3.0"
_transform: true

consumers:
  - username: app-users
    jwt_secrets:
      - algorithm: RS256
        # key is the value that must appear in the JWT "iss" claim
        key: go-microservice
        rsa_public_key: |
          -----BEGIN PUBLIC KEY-----
          MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAuDcSTizHHCuqYxz2Ey76
          rfdgac/XycwJvz8Nf1yWKwZ054cU5GH0gco/LCjuSXCYJvif/UpJ05mAZ4wolilR
          sTb8PhidpV3Gb4ZIeSpsmsTiBZKuVjTH7R6w7Zv969qwFsz+Bkkh4FoD+XfpH9qa
          fqv9aGfj2+or0muhJgTS4ySUylohKGqWf0LWRG+Ti6lmeIA4/02qJ+HIElH2Yby2
          CPlNpszt2mix5sCcZax9NkuwJRoQl1Rlp6WmzHB4U82a7sYwj2cwsZ3zc9ZOyTfF
          KO7v+baIKsjeYChZS6HTFdKW9r2Im/5yF9SOdpI2UEvbkcNSuhYiAdrF1s7F92p/
          GQIDAQAB
          -----END PUBLIC KEY-----

services:
  # ── User service ─────────────────────────────────────────────────────────────
  - name: user-service
    url: http://user_app:6969
    connect_timeout: 60000
    read_timeout: 60000
    write_timeout: 60000
    routes:
      # Protected routes — jwt verified, X-User-ID injected
      - name: user-service-users
        paths:
          - /v1/users
        strip_path: false
        preserve_host: false
        protocols:
          - http
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              claims_to_verify:
                - exp
          - name: request-transformer
            config:
              remove:
                headers:
                  - X-User-ID
          - name: post-function
            config:
              access:
                - |
                  local token = kong.ctx.shared.authenticated_jwt_token
                  if token and token.claims and token.claims.uid then
                    kong.service.request.set_header("X-User-ID", tostring(token.claims.uid))
                  end

      # Public routes — no jwt plugin
      - name: user-service-auth
        paths:
          - /v1/auth
        strip_path: false
        preserve_host: false
        protocols:
          - http

    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - X-Request-ID
          exposed_headers:
            - X-Request-ID
          max_age: 3600
      - name: rate-limiting
        config:
          minute: 100
          policy: local
          fault_tolerant: true
          hide_client_headers: false
      - name: correlation-id
        config:
          header_name: X-Request-ID
          generator: uuid
          echo_downstream: true

  # ── Catalog service ───────────────────────────────────────────────────────────
  - name: catalog-service
    url: http://catalog_app:7070
    connect_timeout: 60000
    read_timeout: 60000
    write_timeout: 60000
    routes:
      - name: catalog-service-routes
        paths:
          - /v1/products
        strip_path: false
        preserve_host: false
        protocols:
          - http
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              claims_to_verify:
                - exp
          - name: request-transformer
            config:
              remove:
                headers:
                  - X-User-ID
          - name: post-function
            config:
              access:
                - |
                  local token = kong.ctx.shared.authenticated_jwt_token
                  if token and token.claims and token.claims.uid then
                    kong.service.request.set_header("X-User-ID", tostring(token.claims.uid))
                  end

    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - X-Request-ID
          exposed_headers:
            - X-Request-ID
          max_age: 3600
      - name: rate-limiting
        config:
          minute: 100
          policy: local
          fault_tolerant: true
          hide_client_headers: false
      - name: correlation-id
        config:
          header_name: X-Request-ID
          generator: uuid
          echo_downstream: true
