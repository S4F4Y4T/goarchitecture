_format_version: "3.0"
_transform: true

services:
  # ── User service ─────────────────────────────────────────────────────────────
  - name: user-service
    url: http://user_app:6969
    connect_timeout: 60000
    read_timeout: 60000
    write_timeout: 60000
    routes:
      - name: user-service-routes
        paths:
          - /v1/users
          - /v1/auth
        strip_path: false
        preserve_host: false
        protocols:
          - http
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - X-Request-ID
          exposed_headers:
            - X-Request-ID
          max_age: 3600
      - name: rate-limiting
        config:
          minute: 100
          policy: local
          fault_tolerant: true
          hide_client_headers: false
      - name: correlation-id
        config:
          header_name: X-Request-ID
          generator: uuid
          echo_downstream: true

  # ── Catalog service ───────────────────────────────────────────────────────────
  - name: catalog-service
    url: http://catalog_app:7070
    connect_timeout: 60000
    read_timeout: 60000
    write_timeout: 60000
    routes:
      - name: catalog-service-routes
        paths:
          - /v1/products
        strip_path: false
        preserve_host: false
        protocols:
          - http
    plugins:
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - X-Request-ID
          exposed_headers:
            - X-Request-ID
          max_age: 3600
      - name: rate-limiting
        config:
          minute: 100
          policy: local
          fault_tolerant: true
          hide_client_headers: false
      - name: correlation-id
        config:
          header_name: X-Request-ID
          generator: uuid
          echo_downstream: true
